[theme]
base = "dark"
primaryColor = "#ff5a1f"
backgroundColor = "#0a0a0a"
secondaryBackgroundColor = "#0f0f0f"
textColor = "#f5f1eb"
font = "sans serif"

[server]
# WebSocket keep-alive: prevent reverse proxies / Docker networks from
# closing idle connections (default 0 = no ping).  30s is safe for most
# nginx / cloud-provider timeouts (typically 60s).
websocketPingInterval = 30
