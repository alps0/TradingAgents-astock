services:
  tradingagents:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - APP_ROOT=/home/appuser/app
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - app_env:/home/appuser/app
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - APP_ROOT=/home/appuser/app
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - app_env:/home/appuser/app
    depends_on:
      - ollama
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
  app_env:
