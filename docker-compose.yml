services:
  tradingagents:
    image: tradingagents:arm64
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - APP_ROOT=/home/appuser/app
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - app_env:/home/appuser/app
    restart: unless-stopped

volumes:
  tradingagents_data:
  app_env:
