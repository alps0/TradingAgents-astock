services:
  tradingagents:
    image: tradingagents:latest
    container_name: tradingagents-1
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - APP_ROOT=/home/appuser/app
    volumes:
      - tradingagents-data:/home/appuser/.tradingagents
    restart: unless-stopped

volumes:
  tradingagents-data:
